

# For defaults and description of each option, see the link bellow
# https://github.com/dunst-project/dunst/blob/master/dunstrc

[global]
# Display
offset = (35, 35)
notification_limit = 5
gap_size = 12
padding = 12
horizontal_padding = 20
frame_width = 1
sort = no

# Progress bar
progress_bar_frame_width = 0
progress_bar_corner_radius = 3

# Colors
foreground = "{{colors.on_surface.default.hex}}"
frame_color = "{{colors.primary.default.hex}}"
highlight = "{{colors.primary.default.hex}}"

# Text
font = Inter 10
markup = full
format = "<small>%a</small>\n<big><b>%s</b></big>\n%b"
alignment = left
vertical_alignment = center
show_age_threshold = -1
hide_duplicate_count = false

# Icon
icon_position = left
min_icon_size = 54
max_icon_size = 80
icon_path = /usr/share/icons/Colloid-Catppuccin/status/24:/usr/share/icons/Colloid-Catppuccin/status/symbolic:/usr/share/pixmaps
icon_corner_radius = 4

# Misc/Advanced
dmenu = wofi --show drun --prompt 'Open with'
corner_radius = 10

# Mouse
mouse_left_click = close_current
mouse_middle_click = do_action, close_current
mouse_right_click = close_all

[urgency_low]
background = "{{colors.surface.default.hex}}"
timeout = 3

[urgency_normal]
background = "{{colors.surface.default.hex}}"
timeout = 8

[urgency_critical]
background = "{{colors.error_container.default.hex}}"
frame_color = "{{colors.error.default.hex}}"
highlight = "{{colors.on_error.default.hex}}"
timeout = 0

# Rules
[fullscreen_delay_everything]
fullscreen = delay

[fullscreen_show_critical]
msg_urgency = critical
fullscreen = show